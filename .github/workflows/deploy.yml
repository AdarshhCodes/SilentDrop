name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Only proceed if CI passed
jobs:
  # ─── Guard ─────────────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding to deploy
        run: echo "CI workflow succeeded. Triggering deploys."

  # ─── Backend deploy (Render) ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    needs: check-ci
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        # RENDER_DEPLOY_HOOK_URL must be set in:
        # GitHub → Settings → Secrets and variables → Actions → Repository secrets
        # Get the URL from: Render dashboard → your service → Settings → Deploy Hook
        run: |
          curl -s --fail-with-body \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            | jq .
        env:
          # jq is pre-installed on ubuntu-latest; this pretty-prints the
          # Render API response so deploy IDs are visible in the Actions log.
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  # ─── Frontend (Vercel) ─────────────────────────────────────────────────────
  # vercel.json is NOT present in this repo, which means Vercel is connected
  # via GitHub integration and auto-deploys on every push to main by itself.
  # Duplicating a Vercel CLI deploy here would cause a double-deploy, so this
  # job only adds a commit status comment confirming CI passed.
  confirm-frontend:
    name: Confirm Frontend CI → Vercel auto-deploy active
    needs: check-ci
    runs-on: ubuntu-latest

    steps:
      - name: Post CI-passed commit status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.payload.workflow_run.head_sha,
              state: 'success',
              description: 'CI passed — Vercel auto-deploy triggered by GitHub integration',
              context: 'deploy/frontend-vercel',
            });
            core.info('Commit status posted.');
